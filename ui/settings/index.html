<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Clipboard - Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Settings</h1>
    <div class="setting-row">
      <label for="stack-limit">Stack Limit</label>
      <p class="description">Maximum number of clipboard items to keep</p>
      <input type="number" id="stack-limit" min="1" max="50" value="5">
    </div>
    <div class="actions">
      <button id="save-btn">Save</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
